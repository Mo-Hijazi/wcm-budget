<script>
// One-time rename of legacy WCM-named localStorage keys → marro_* (runs before the
// pre-paint read below so there's no theme flash). Carries each value over, then
// drops the old key. No-op once migrated. Safe: Supabase is the source of truth.
(function(){try{
  var map={marro_v8:"wcm_v8",marro_v8_base:"wcm_v8_base",marro_v7:"wcm_v7",marro_uid:"wcm_uid",marro_theme_v2:"wcm_theme_v2"};
  for(var nk in map){var ok=map[nk],ov=localStorage.getItem(ok);if(ov!==null){if(localStorage.getItem(nk)===null)localStorage.setItem(nk,ov);localStorage.removeItem(ok);}}
}catch(e){}})();
// Pre-paint theme guard: set data-theme before the stylesheet is consumed so an
// offline PWA cold start never flashes the wrong theme. Mirrors the app logic:
// legacy states (no marro_theme_v2 marker) stay dark; fresh visitors follow the OS.
(function(){try{
  var dark = true;
  var raw = localStorage.getItem("marro_v8");
  if (raw && localStorage.getItem("marro_theme_v2")) dark = JSON.parse(raw).darkMode !== false;
  else if (!raw) dark = !window.matchMedia("(prefers-color-scheme: light)").matches;
  document.documentElement.dataset.theme = dark ? "dark" : "light";
}catch(e){ document.documentElement.dataset.theme = "dark"; }})();
</script>

    --glass-card: rgba(255,255,255,0.30);

    --shadow-card: 0 8px 28px rgba(60,55,40,0.14), 0 2px 6px rgba(60,55,40,0.08), inset 0 1.5px 0 rgba(255,255,255,0.95), inset 0 -1px 0 rgba(60,55,40,0.05);
    --shadow-card-hover: 0 16px 44px rgba(60,55,40,0.20), 0 3px 8px rgba(60,55,40,0.10), inset 0 1.5px 0 rgba(255,255,255,1), inset 0 -1px 0 rgba(60,55,40,0.06);
    --shadow-modal: 0 32px 80px rgba(60,55,40,0.30), 0 6px 20px rgba(60,55,40,0.14), inset 0 1.5px 0 rgba(255,255,255,0.98), inset 0 -1px 0 rgba(60,55,40,0.06);

  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* App-like chrome, not a document: plain text isn't selectable/I-beam by
     default (mirrors native macOS/iOS apps) — only form fields are. */
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: background .3s; cursor: default; user-select: none; -webkit-user-select: none; }
  input, textarea, [contenteditable] { cursor: text; user-select: text; -webkit-user-select: text; }
  #root { min-height: 100vh; background: transparent; position: relative; z-index: 1; }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: var(--text); }
  /* Boot moment: rings bloom outward in sequence, the marigold dot orbits while we wait */
  .boot-mark { position: relative; width: 76px; height: 76px; }
  .boot-ring { transform-box: fill-box; transform-origin: center; animation: bootRing 0.9s cubic-bezier(0.23,1,0.32,1) both; }
  .boot-r1 { animation-delay: 0.05s; } .boot-r2 { animation-delay: 0.18s; } .boot-r3 { animation-delay: 0.31s; }
  .boot-core { transform-box: fill-box; transform-origin: center; animation: bootRing 0.9s cubic-bezier(0.23,1,0.32,1) both, bootBreathe 3s ease-in-out 1.4s infinite; }
  @keyframes bootRing { from { transform: scale(0.55); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes bootBreathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
  .boot-orbit { position: absolute; inset: 0; animation: bootSpin 2.6s linear infinite; opacity: 0; animation-delay: 0.55s; animation-fill-mode: forwards; }
  /* Orbit rides the middle ring (r 7.5 of 26 viewBox at 76px ≈ 22px) */
  .boot-dot { position: absolute; left: 50%; top: 50%; width: 6px; height: 6px; margin: -3px 0 0 -3px; border-radius: 50%; background: #DDA528; transform: translateY(-22px); box-shadow: 0 0 8px rgba(221,165,40,0.55); }
  @keyframes bootSpin { from { opacity: 1; transform: rotate(0deg); } to { opacity: 1; transform: rotate(360deg); } }
  .boot-name { margin-top: 16px; font-family: 'Newsreader', Georgia, serif; font-size: 27px; font-weight: 600; letter-spacing: -0.02em; animation: bootFade 0.7s cubic-bezier(0.23,1,0.32,1) 0.45s both; }
  .boot-sub { margin-top: 4px; font-size: 12px; color: var(--text-dim); font-family: 'Inter', system-ui, sans-serif; animation: bootFade 0.7s cubic-bezier(0.23,1,0.32,1) 0.65s both; }
  @keyframes bootFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .boot-ring, .boot-core, .boot-name, .boot-sub { animation: none; opacity: 1; transform: none; }
    .boot-orbit { animation: none; opacity: 0; }
    .marro-logo-svg circle { animation: none !important; }
  }
  input, select, textarea { color-scheme: var(--color-scheme); }
  /* Form controls don't inherit the body font by default — keep everything in Inter */
  input, select, textarea, button { font-family: inherit; }
  /* ── Glass inputs — override all inline background:C.bg on form controls ── */
  input:not([type="checkbox"]):not([type="radio"]):not([type="file"]),
  select, textarea {
    background: var(--input-bg) !important;
    border-color: var(--input-border) !important;
    color: var(--text) !important;
  }
  input:not([type="checkbox"]):not([type="radio"]):not([type="file"]):focus,
  select:focus, textarea:focus {
    outline: none !important;
    border-color: var(--input-focus-border) !important;
    background: var(--input-focus-bg) !important;
    box-shadow: 0 0 0 3px var(--focus-glow) !important;
  }
  /* Consistent placeholder treatment everywhere */
  input::placeholder, textarea::placeholder { color: var(--text-faint) !important; opacity: 1; }
  /* Remove legacy number-input spinner arrows (Chrome/Safari + Firefox) */
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

  /* Tooltip entrance — short, origin-aware (Emil) */
  @keyframes tipIn {
    from { opacity: 0; transform: translateX(-50%) translateY(4px) scale(0.96); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0)   scale(1);    }
  }
  /* Native select: drop OS chrome, add one consistent caret */
  select {
    -webkit-appearance: none; -moz-appearance: none; appearance: none;
    background-image: var(--select-caret) !important;
    background-repeat: no-repeat !important;
    background-position: right 10px center !important;
    padding-right: 28px !important;
  }
  /* One unified keyboard-focus ring for buttons & interactive controls */
  button:focus-visible, [role="button"]:focus-visible, a:focus-visible, summary:focus-visible {
    outline: 2px solid var(--focus-ring);
    outline-offset: 2px;
    border-radius: 8px;
  }
  /* Mouse clicks shouldn't show the ring (only keyboard) */
  button:focus:not(:focus-visible) { outline: none; }
  /* Checkboxes/radios pick up the brand tint instead of OS blue */
  input[type="checkbox"], input[type="radio"] { accent-color: var(--accent); cursor: pointer; }

  /* ── Hover/press affordance system (Apple-style) ─────────────────────────
     Every button gets a tactile press (depress on tap) — universal, safe
     (scale never reflows or overrides colors). Hover treatment is layered by
     button TYPE on top:
       .shimmer-text → plain nav text (tabs, year pills): glow through glyphs
       .btn-fill     → filled colored CTAs (Save, Add entry): quiet brighten+lift
       .btn-pop      → bordered/transparent chrome (Browse weeks, dropdowns): tint+lift
       .xbtn         → icon-only ghost buttons (✕, chevrons): tint+scale
       .txt-act      → text links (← Back, Change): opacity lift
     Apple is restrained — no glow/shimmer on chrome; that's reserved for nav text. */
  button { transition: transform 140ms cubic-bezier(0.34,1.56,0.64,1), filter 140ms ease; }
  button:active:not(:disabled) { transform: scale(0.97); }
  .xbtn, .btn-pop, .btn-fill { transition: transform 140ms cubic-bezier(0.34,1.56,0.64,1), background 140ms ease, color 140ms ease, border-color 140ms ease, filter 140ms ease; }
  /* Hit-slop: .xbtn icons render small (26-30px) to stay visually quiet, but the
     CLICKABLE area must still meet Apple's 44x44pt minimum. ::after paints nothing
     (transparent) but extends the hit-test box via negative inset, so taps land
     even where the visible circle doesn't reach — no layout/visual change. */
  .xbtn { position: relative; }
  .xbtn::after { content: ""; position: absolute; inset: -8px; }
  @media (hover: hover) and (pointer: fine) {
    .xbtn:hover:not(:disabled) { background: var(--input-bg); color: var(--text); transform: scale(1.08); }
    .xbtn-danger:hover:not(:disabled) { color: var(--xbtn-danger, currentColor); }
    .menu-row:hover { background: var(--input-bg); }
    /* Text-action buttons ("← Back", "Change", "isn't listed →" etc):
       opacity lift + cursor on hover so they read as clickable, not static text. */
    .txt-act:hover:not(:disabled) { opacity: 1; }
    /* Bordered/transparent chrome buttons (Browse weeks, Import CSV, dropdown
       triggers) — Apple's toolbar hover is a quiet tint + slight lift. */
    .btn-pop:hover:not(:disabled) { background: var(--input-bg) !important; border-color: var(--border-strong, var(--text)); transform: scale(1.03); }
    /* Filled colored CTAs (Save, Add entry, Got it) — never override the fill
       color; just brighten + lift so it pops without losing its meaning.
       Disabled CTAs (submit-until-valid) stay inert — no hover reaction. */
    .btn-fill:hover:not(:disabled) { filter: brightness(1.07); transform: scale(1.02); }
  }
  .txt-act { cursor: pointer; opacity: 0.72; transition: opacity 140ms ease; }
  /* Tab bar: hide scrollbar. Edge fades are applied via .fade-l/.fade-r,
     toggled at runtime by useEdgeFade() based on actual scroll overflow —
     not a viewport breakpoint, since overflow depends on content (badge
     counts, font metrics), not window width. */
  .tabbar { scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .tabbar::-webkit-scrollbar { display: none; }
  .scrollx { scrollbar-width: thin; }
  .tabbar.fade-l, .scrollx.fade-l { -webkit-mask-image: linear-gradient(to right, transparent 0, #000 26px, #000 100%); mask-image: linear-gradient(to right, transparent 0, #000 26px, #000 100%); }
  .tabbar.fade-r, .scrollx.fade-r { -webkit-mask-image: linear-gradient(to right, #000 calc(100% - 26px), transparent 100%); mask-image: linear-gradient(to right, #000 calc(100% - 26px), transparent 100%); }
  .tabbar.fade-l.fade-r, .scrollx.fade-l.fade-r { -webkit-mask-image: linear-gradient(to right, transparent 0, #000 26px, #000 calc(100% - 26px), transparent 100%); mask-image: linear-gradient(to right, transparent 0, #000 26px, #000 calc(100% - 26px), transparent 100%); }
  /* Subtle themed scrollbar for in-panel scroll areas (avatar gallery) */
  .av-scroll { scrollbar-width: thin; scrollbar-color: var(--scroll-thumb, rgba(140,138,128,0.35)) transparent; }
  .av-scroll::-webkit-scrollbar { width: 6px; }
  .av-scroll::-webkit-scrollbar-track { background: transparent; }
  .av-scroll::-webkit-scrollbar-thumb { background: var(--scroll-thumb, rgba(140,138,128,0.32)); border-radius: 6px; }
  .av-scroll::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover, rgba(140,138,128,0.5)); }

  /* ── Ambient blob background ── */
  .blob-layer {
    position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
    /* Pin to its own compositor layer — without this, scrolling repaints the blurred
       gradients and the top of the page flickers at scroll extremes */
    transform: translateZ(0); backface-visibility: hidden;
  }
  .blob {
    position: absolute; border-radius: 50%; will-change: transform;
    filter: blur(90px); opacity: var(--blob-opacity);
  }
  /* Budget-health states: stacked gradient layers crossfaded by opacity only —
     the gradients themselves are never animated. Low-tide = over budget (muted,
     cold); bloom = savings milestone (slow marigold swell). */
  .blob::before, .blob::after {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    opacity: 0; transition: opacity 2.4s ease-in-out;
  }
  .blob::before { background: radial-gradient(circle, var(--blob-over-a) 0%, var(--blob-over-b) 68%); }
  .blob::after  { background: radial-gradient(circle, var(--blob-bloom-a) 0%, var(--blob-bloom-b) 68%); }
  .blobs-over  .blob::before { opacity: 1; }
  .blobs-bloom .blob::after  { opacity: 1; }
  .blob-1 {
    width: 700px; height: 700px; top: -180px; left: max(-250px, calc(50% - 880px));
    background: radial-gradient(circle, var(--blob1-a) 0%, var(--blob1-b) 65%);
    animation: blobFloat1 21s ease-in-out infinite;
  }
  .blob-2 {
    width: 560px; height: 560px; top: 8%; right: max(-200px, calc(50% - 720px));
    background: radial-gradient(circle, var(--blob2-a) 0%, var(--blob2-b) 60%);
    animation: blobFloat2 25s ease-in-out infinite;
  }
  .blob-3 {
    width: 520px; height: 520px; bottom: 10%; left: max(3%, calc(50% - 760px));
    background: radial-gradient(circle, var(--blob3-a) 0%, var(--blob3-b) 70%);
    animation: blobFloat3 19s ease-in-out infinite;
  }
  .blob-4 {
    width: 420px; height: 420px; bottom: -80px; right: max(6%, calc(50% - 580px));
    background: radial-gradient(circle, var(--blob4-a) 0%, var(--blob4-b) 70%);
    animation: blobFloat4 23s ease-in-out infinite;
  }
  @keyframes blobFloat1 {
    0%,100% { transform: translate(0,0) scale(1); }
    33%     { transform: translate(55px,45px) scale(1.08); }
    66%     { transform: translate(-25px,65px) scale(0.96); }
  }
  @keyframes blobFloat2 {
    0%,100% { transform: translate(0,0) scale(1); }
    40%     { transform: translate(-65px,55px) scale(1.06); }
    70%     { transform: translate(28px,-38px) scale(1.12); }
  }
  @keyframes blobFloat3 {
    0%,100% { transform: translate(0,0) scale(1); }
    30%     { transform: translate(48px,-55px) scale(1.1); }
    65%     { transform: translate(-35px,28px) scale(0.93); }
  }
  @keyframes blobFloat4 {
    0%,100% { transform: translate(0,0) scale(1); }
    45%     { transform: translate(-48px,-45px) scale(1.14); }
    75%     { transform: translate(55px,18px) scale(0.91); }
  }

  /* ── Glass card system ── */
  @keyframes cardIn {
    from { opacity:0; transform:scale(0.96) translateY(6px); }
    to   { opacity:1; transform:scale(1)    translateY(0);   }
  }
  .mc {
    background: var(--glass-card-fallback);
    border: 1px solid var(--glass-card-border-fallback);
    border-radius: 22px;
    box-shadow: var(--shadow-card);
    transition: transform 260ms cubic-bezier(0.23,1,0.32,1), opacity 260ms ease;
    will-change: transform;
    position: relative;
  }
  @supports (backdrop-filter: blur(1px)) {
    .mc {
      background: var(--glass-card);
      backdrop-filter: blur(40px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter: blur(40px) saturate(180%) brightness(1.08);
      border-color: var(--glass-card-border);
      box-shadow: var(--shadow-card);
    }
    .mc-p {
      background: var(--glass-primary) !important;
      border-color: var(--glass-primary-border) !important;
    }
    /* Light theme: skip the brightness boost — it pushes the canvas into glare */
    [data-theme="light"] .mc {
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
    }
    [data-theme="light"] .mm {
      backdrop-filter: blur(72px) saturate(200%) brightness(1.04);
      -webkit-backdrop-filter: blur(72px) saturate(200%) brightness(1.04);
    }
  }
  @media (hover: hover) and (pointer: fine) {
    .mc:hover { transform: translateY(-3px); box-shadow: var(--shadow-card-hover); }
    .mc:hover .mc-sh { opacity: 1; }
  }
  .mc:active { transform: scale(0.97); }
  .mc:focus-visible { outline: 2px solid rgba(246,239,221,0.65); outline-offset: 3px; }
  .mc-e { animation: cardIn 260ms cubic-bezier(0.23,1,0.32,1) both; }
  /* Sibling cards enter with a 45ms stagger (Emil: 30–80ms; capped at 6) */
  .mc-e:nth-child(2) { animation-delay: 45ms; }
  .mc-e:nth-child(3) { animation-delay: 90ms; }
  .mc-e:nth-child(4) { animation-delay: 135ms; }
  .mc-e:nth-child(5) { animation-delay: 180ms; }
  .mc-e:nth-child(n+6) { animation-delay: 225ms; }
  /* Theme toggle icon cross-swap */
  @keyframes iconSwap {
    from { opacity: 0; transform: rotate(-30deg) scale(0.85); }
    to   { opacity: 1; transform: none; }
  }
  .mc-sh {
    position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(135deg, rgba(255,255,255,0.10) 0%, transparent 50%);
    pointer-events: none; opacity: 0; transition: opacity 180ms ease;
  }
  [data-theme="light"] .mc-sh {
    background: linear-gradient(135deg, rgba(255,255,255,0.45) 0%, transparent 50%);
  }
  .mc-sp {
    position: absolute; left: 8%; right: 8%; top: 0;
    height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.55) 30%, rgba(255,255,255,0.55) 70%, transparent 100%);
    pointer-events: none;
  }
  /* ── Glass modal panel ── */
  .mm {
    background: var(--glass-modal-fallback);
    border: 1px solid var(--glass-card-border-fallback);
    border-radius: 16px;
    box-shadow: var(--shadow-modal);
  }
  @supports (backdrop-filter: blur(1px)) {
    .mm {
      background: var(--glass-modal);
      backdrop-filter: blur(50px) saturate(200%) brightness(1.08);
      -webkit-backdrop-filter: blur(50px) saturate(200%) brightness(1.08);
      border-color: var(--glass-modal-border);
      box-shadow: var(--shadow-modal);
    }
  }
  /* ── Onboarding choreography ── */
  @keyframes obStepIn {
    from { opacity: 0; transform: translateY(14px) scale(0.985); filter: blur(2px); }
    to   { opacity: 1; transform: none; filter: blur(0); }
  }
  @keyframes obRise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes obRingDraw {
    0%   { stroke-dashoffset: var(--circ); opacity: 0; }
    20%  { opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 1; }
  }
  @keyframes obCorePop {
    0%   { transform: scale(0); opacity: 0; }
    60%  { transform: scale(1.4); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes obOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes obSheen {
    0%   { transform: translateX(-120%); }
    60%,100% { transform: translateX(120%); }
  }
  .ob-step { animation: obStepIn 480ms cubic-bezier(0.23,1,0.32,1) both; }
  .ob-rise { animation: obRise 560ms cubic-bezier(0.23,1,0.32,1) both; }
  .ob-orbit { transform-box: fill-box; transform-origin: center; animation: obOrbit 8s linear infinite; }
  .ob-dot-pop { transform-box: fill-box; transform-origin: center; animation: obCorePop 700ms cubic-bezier(0.23,1,0.32,1) both; }
  .ob-swatch { transition: transform 160ms cubic-bezier(0.23,1,0.32,1), box-shadow 160ms ease; }
  @media (hover: hover) and (pointer: fine) {
    .ob-swatch:hover { transform: translateY(-3px) scale(1.04); }
    .ob-cta:hover { transform: translateY(-1px); }
  }
  .ob-cta { transition: transform 140ms cubic-bezier(0.23,1,0.32,1), background 140ms ease, opacity 140ms ease; }
  /* ── Letter shimmer on hover ──────────────────────────────────────────────
     A glow sweeps through the GLYPHS themselves (not an overlay): on hover the
     text fill is clipped from a moving gradient — base text color with a bright
     `--shimmer-glow` band that travels across the letters once. Only for text
     controls (icons/SVGs are unaffected by background-clip:text). The element's
     own `color` stays as the rest state; `-webkit-text-fill-color` (not `color`)
     drives the hover fill so it cooperates with any inline color. Reduced-motion
     below restores a plain instant brighten. */
  .shimmer-text { transition: color 140ms ease; }
  @media (hover: hover) and (pointer: fine) {
    .shimmer-text:hover {
      /* !important: the buttons carry an inline `background` shorthand (transparent),
         which would otherwise reset background-image/clip and kill the effect. */
      background-image: linear-gradient(100deg,
        var(--text) 0%, var(--text) 38%, var(--shimmer-glow) 50%, var(--text) 62%, var(--text) 100%) !important;
      background-size: 250% 100% !important; background-repeat: no-repeat !important;
      background-position: 100% 0; background-origin: padding-box !important;
      -webkit-background-clip: text !important; background-clip: text !important;
      -webkit-text-fill-color: transparent;
      animation: textShimmer 750ms ease forwards;
    }
  }
  @keyframes textShimmer {
    /* Bounds matter: at background-size 250%, position must stay within
       roughly (-67%, 167%) or the gradient box slides fully off the glyphs
       and they go transparent (no paint = invisible letters). 100%→0% sweeps
       the gradient's full 0–100% range across the text without ever exiting. */
    from { background-position: 100% 0; }
    to   { background-position: 0% 0; }
  }
  /* Respect user motion preferences (Emil Kowalski) */
  @media (prefers-reduced-motion: reduce) {
    .shimmer-text:hover { animation: none !important; background-image: none; -webkit-text-fill-color: var(--text); color: var(--text); }
    /* No scale/lift motion when reduced-motion is on; keep the color/tint cues. */
    button:active:not(:disabled), .xbtn:hover, .btn-pop:hover, .btn-fill:hover { transform: none !important; }
    .mc { transition: none; }
    .mc-e { animation: none !important; opacity: 1 !important; transform: none !important; }
    .mc-sh { display: none; }
    .blob { animation: none !important; }
    [style*="iconSwap"] { animation: none !important; }
    .ob-step, .ob-rise, .ob-orbit, .ob-dot-pop { animation: none !important; opacity: 1 !important; transform: none !important; filter: none !important; }
    [class*="obRingDraw"], [style*="obRingDraw"] { animation: none !important; stroke-dashoffset: 0 !important; opacity: 1 !important; }
  }
</style>
</head>

<script>
if('serviceWorker' in navigator){
  // Reload once when a new service worker takes control, so fresh code lands without manual cache clearing
  let reloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(reloaded)return; reloaded=true; window.location.reload();
  });
  navigator.serviceWorker.register('/sw.js',{updateViaCache:'none'}).then(reg=>{
    reg.update();                       // force an update check on every load
    setInterval(()=>reg.update(),60*60*1000); // and hourly while open
  }).catch(()=>{});
}
</script>
